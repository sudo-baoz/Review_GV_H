<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>AI Evaluation Filler</h1>
        <p>Điền form đánh giá giảng viên tự động</p>
      </div>
    </header>

    <!-- API Key Section -->
    <div class="api-key-section">
      <div class="section-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Gemini API Key
        <span id="keySavedBadge" class="key-badge">Đã lưu</span>
      </div>
      <div class="api-key-row">
        <input
          type="password"
          id="apiKeyInput"
          placeholder="AIzaSy..."
          autocomplete="off"
          spellcheck="false"
        >
        <button id="saveKeyBtn" class="btn-save" data-state="idle">
          <svg class="btn-save__icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          <svg class="btn-save__check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span class="btn-save__text">Lưu</span>
        </button>
      </div>
      <div class="api-key-actions">
        <button id="testKeyBtn" class="btn-test">
          <svg id="testIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          <span id="testBtnText">Kiểm tra key</span>
          <svg id="testSpinner" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="display:none" class="spin">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Textarea -->
    <div class="textarea-wrapper">
      <textarea
        id="reviewText"
        placeholder="Nhập nhận xét của bạn về giảng viên...&#10;&#10;Ví dụ: Giảng viên nhiệt tình, giảng bài dễ hiểu, cung cấp đầy đủ tài liệu."
        spellcheck="false"
      ></textarea>
      <div class="textarea-counter">
        <span id="charCount">0</span> ký tự
      </div>
    </div>

    <!-- Start Button -->
    <button id="startBtn" class="btn-primary">
      <span class="btn-text">Điền form bằng AI</span>
      <span class="btn-spinner" id="spinner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
      </span>
    </button>

    <!-- Status Messages -->
    <div id="statusBox" class="status-box"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
